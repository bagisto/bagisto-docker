services:
  nginx-php:
    container_name: nginx-php
    build:
      args:
        uid: 1000
        user: $USER
        container_project_path: /var/www/html/
      context: ./runtimes/nginx-php
      dockerfile: Dockerfile
    image: nginx-php
    ports:
      - 80:80
      - 5173:5173
    volumes:
      - ~/.ssh:/home/$USER/.ssh
      - ./runtimes/nginx-php/configs/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./runtimes/nginx-php/configs/supervisor/:/etc/supervisor/conf.d/
      - ./workspace/:/var/www/html/

  mysql:
    image: mysql:8.0
    ports:
      - 3306:3306
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./.runtimes-data/mysql-data:/var/lib/mysql/

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - 3030:80
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 2G
      MEMORY_LIMIT: 2G
      MAX_EXECUTION_TIME: 600

