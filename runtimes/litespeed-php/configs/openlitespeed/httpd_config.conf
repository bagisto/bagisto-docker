serverName                Bagisto
user                      www-data
group                     www-data
priority                  0
inMemBufSize              60M
swappingDir               /tmp/lshttpd/swap
autoFix503                1
gracefulRestartTimeout    300
mime                      conf/mime.properties
showVersionNumber         0
adminEmails               root@localhost

errorlog logs/error.log {
  logLevel                INFO
  debugLevel              0
  rollingSize             10M
  enableStderrLog         1
}

accesslog logs/access.log {
  rollingSize             10M
  keepDays                30
  compressArchive         0
}

indexFiles                index.php, index.html

expires {
  enableExpires           1
  expiresByType           image/*=A2592000, text/css=A2592000, application/javascript=A2592000, application/x-javascript=A2592000, font/*=A2592000, application/font-woff2=A2592000, image/svg+xml=A2592000
}

tuning {
  maxConnections          10000
  connTimeout             300
  maxKeepAliveReq         1000
  keepAliveTimeout        5
  eventDispatcher         best
  maxReqURLLen            32768
  maxReqHeaderSize        65536
  maxReqBodySize          2047M
  maxDynRespHeaderSize    32768
  maxDynRespSize          2047M
  useSendfile             1
  fileETag                28
  enableGzipCompress      1
  enableDynGzipCompress   1
  gzipCompressLevel       6
  compressibleTypes       text/*, application/x-javascript, application/xml, application/javascript, image/svg+xml, application/rss+xml, application/json
}

fileAccessControl {
  followSymbolLink        1
  checkSymbolLink         0
  requiredPermissionMask  000
  restrictedPermissionMask 000
}

scripthandler {
  add                     lsapi:lsphp php
}

extprocessor lsphp {
  type                    lsapi
  address                 127.0.0.1:9000
  maxConns                35
  initTimeout             60
  retryTimeout            0
  persistConn             1
  respBuffer              0
  autoStart               0
  backlog                 100
  instances               1
}

virtualhost bagisto {
  vhRoot                  /var/www/html/bagisto
  configFile              $SERVER_ROOT/conf/vhosts/bagisto.conf
  allowSymbolLink         1
  enableScript            1
  restrained              0
}

listener Default {
  address                 *:80
  secure                  0
  map                     bagisto *
}
